name: Telegram bot — register webhook

# Manually register (or refresh) the Telegram webhook → /api/telegram/webhook.
# Run this once after setting TELEGRAM_WEBHOOK_SECRET in both GitHub secrets
# and Vercel env (they must match, or Telegram callbacks get 403'd).
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'set | info | delete'
        required: false
        default: 'set'
      bot:
        description: 'main | plus'
        required: false
        default: 'main'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Register Telegram webhook
        env:
          MAIN_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MAIN_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          PLUS_TOKEN: ${{ secrets.TELEGRAM_PLUS_BOT_TOKEN }}
          PLUS_SECRET: ${{ secrets.TELEGRAM_PLUS_WEBHOOK_SECRET }}
          ACTION: ${{ inputs.action }}
          BOT: ${{ inputs.bot }}
        run: |
          if [ "$BOT" = "plus" ]; then
            export TELEGRAM_BOT_TOKEN="$PLUS_TOKEN"
            export TELEGRAM_WEBHOOK_SECRET="$PLUS_SECRET"
            export WEBHOOK_URL="https://dityam.com.ua/api/telegram/plus"
          else
            export TELEGRAM_BOT_TOKEN="$MAIN_TOKEN"
            export TELEGRAM_WEBHOOK_SECRET="$MAIN_SECRET"
            export WEBHOOK_URL="https://dityam.com.ua/api/telegram/webhook"
          fi
          node scripts/set-telegram-webhook.mjs
