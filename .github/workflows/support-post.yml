name: Telegram — weekly support post

on:
  schedule:
    # Saturdays 11:00 Kyiv summer time (08:00 UTC). Не перетинається з
    # щоденним діджестом (06:00 UTC) і ботом нових постів (06:00, 15:00 UTC).
    - cron: '0 8 * * 6'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print message without sending'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Post support reminder to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/post-support-message.mjs
