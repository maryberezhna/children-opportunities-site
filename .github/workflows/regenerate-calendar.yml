name: Regenerate calendar

# Тригери:
# - 1-го числа кожного місяця о 03:00 UTC (щоб ковзне вікно років оновлювалось)
# - Вручну з UI GitHub
# - На push, який змінює сам скрипт
on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/generate_calendar.py"
      - "scripts/requirements.txt"
      - ".github/workflows/regenerate-calendar.yml"

# Дозвіл боту коммітити назад у репо
permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate calendar files
        run: python scripts/generate_calendar.py

      - name: Commit changes if any
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/calendar.ics data/events.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(calendar): regenerate [skip ci]"
            git push
          fi
