name: Discover agent (keyword of the day)

on:
  schedule:
    - cron: '0 5 * * *'   # daily, before the main scrape
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print candidates without saving drafts'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run discovery agent
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Send each candidate to the admin chat with ✅/❌ approve buttons.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          # Optional: override the model if web search isn't supported on the default.
          DISCOVER_MODEL: ${{ vars.DISCOVER_MODEL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python discover_agent.py
