name: Deadline check

on:
  schedule:
    - cron: '0 6 * * *'  # daily 06:00 UTC (09:00 Kyiv summer / 08:00 winter)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print actions without writing to DB'
        required: false
        default: 'false'
      notify:
        description: 'Post a Telegram digest of items due within 7 days'
        required: false
        default: 'true'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Audit & archive deadlines
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFY: ${{ github.event.inputs.notify || 'true' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/check-deadlines.mjs

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deadline-report
          path: scripts/output/*.txt
          if-no-files-found: ignore
          retention-days: 30
