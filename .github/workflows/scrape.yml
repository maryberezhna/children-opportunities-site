name: Scrape opportunities

on:
  schedule:
    - cron: '0 5 * * 1'  # Mondays 05:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run scrapers
        run: npm run scrape

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: opportunities-csv
          path: scrapers/output/*.csv
          if-no-files-found: error
          retention-days: 30
