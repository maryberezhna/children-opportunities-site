name: Dityam+ — weekly stats to admin

# Щопонеділка 07:00 UTC шле статистику платного бота в адмін-чат.
on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true = лише лог, не слати'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stats:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Send Plus stats
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          WAYFORPAY_AMOUNT: '79'
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/plus-stats.mjs --dry-run
          else
            node scripts/plus-stats.mjs
          fi
